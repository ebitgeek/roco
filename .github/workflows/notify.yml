name: Notify Ex Script

on:
  schedule:
    - cron: "0 3 * * *"   # 11:00 北京时间
    - cron: "0 7 * * *"   # 15:00 北京时间
    - cron: "0 11 * * *"  # 19:00 北京时间
    - cron: "0 15 * * *"  # 23:00 北京时间
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests || true

      - name: Run notify script
        run: |
          python notify_ex.py