name: Update Merchant Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests || true

      - name: Run script
        run: |
          python update_merchant.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/json/merchant-current.json

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "chore: update merchant data"

      - name: Push changes
        run: |
          git push origin main