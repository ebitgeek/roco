name: Update Merchant Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests || true

      - name: Run script
        run: |
          python update_merchant.py

      - name: Commit changes
        id: commit_changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/json/merchant-current.json
          git add public/json/merchant-history.json

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "chore: update merchant data"
          git push origin main

          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Trigger Deploy
        if: steps.commit_changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            })